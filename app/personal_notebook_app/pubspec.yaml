name: personal_notebook_app
description: PersonalNotebook - 个人知识库全平台 App
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.0
  # State
  provider: ^6.1.0
  # Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  # UI
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  # Platform
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  # Desktop
  process_run: ^1.1.0
  window_manager: ^0.3.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets: []
