name: Bug Report
description: 提交 PersonalNotebook 缺陷报告
labels: [bug]
body:
  - type: dropdown
    attributes:
      label: 平台
      options: [macOS, Windows, Android, iOS, Backend API, 其他]
  - type: input
    attributes:
      label: App 版本
      placeholder: 0.2.0+2
  - type: input
    attributes:
      label: Core 版本
      placeholder: 0.2.0
  - type: textarea
    attributes:
      label: 复现步骤
  - type: textarea
    attributes:
      label: 期望行为
  - type: textarea
    attributes:
      label: 实际行为
  - type: textarea
    attributes:
      label: 日志/截图
  - type: dropdown
    attributes:
      label: 严重程度
      options: [P0-阻塞, P1-主要功能失败, P2-可绕过, P3-体验问题]
  - type: textarea
    attributes:
      label: 诊断信息
      description: Settings → 复制诊断信息，粘贴在此
