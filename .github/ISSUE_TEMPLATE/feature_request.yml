name: Feature Request
description: 提出功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
  - type: textarea
    id: request
    attributes:
      label: 需求描述
  - type: textarea
    id: value
    attributes:
      label: 用户价值
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options: ["P0", "P1", "P2", "P3"]
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
  - type: textarea
    id: notes
    attributes:
      label: 备注
