name: App Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd app/personal_notebook_app
          flutter pub get
          flutter analyze
          flutter test

  build-android-debug:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd app/personal_notebook_app
          flutter pub get
          flutter build apk --debug

  build-macos:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd app/personal_notebook_app
          flutter pub get
          flutter build macos --release

  build-ios:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd app/personal_notebook_app
          flutter pub get
          flutter build ios --no-codesign
